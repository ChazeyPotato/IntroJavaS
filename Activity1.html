<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Calculator</title>
  <link rel="stylesheet" href="css/calculator.css">
</head>
<body>
  <div class="container">
    <a href="index.html" class="btn-back-cute">← Back</a>

    <h2>Simple Calculator ✨</h2>

    <input type="number" id="num1" placeholder="✨ Enter number 1">
    <input type="number" id="num2" placeholder="✨ Enter number 2">

    <div class="btn-group">
      <button onclick="add()">Add +</button>
      <button onclick="subtract()">Subtract -</button>
      <button onclick="multiply()">Multiply ×</button>
      <button onclick="divide()">Divide ÷</button>
    </div>

    <h3 id="result">Waiting for numbers...</h3> 
  </div>

  <script>
    function add() {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      if (isNaN(num1) || isNaN(num2)) {
        document.getElementById("result").innerText = "Please enter valid numbers! 💕";
        return;
      }
      document.getElementById("result").innerText = "Result: " + (num1 + num2) + " ⭐";
    }

    function subtract() {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      if (isNaN(num1) || isNaN(num2)) {
        document.getElementById("result").innerText = "Please enter valid numbers! 💕";
        return;
      }
      document.getElementById("result").innerText = "Result: " + (num1 - num2) + " ⭐";
    }

    function multiply() {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      if (isNaN(num1) || isNaN(num2)) {
        document.getElementById("result").innerText = "Please enter valid numbers! 💕";
        return;
      }
      document.getElementById("result").innerText = "Result: " + (num1 * num2) + " ⭐";
    }

    function divide() {
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      if (isNaN(num1) || isNaN(num2)) {
        document.getElementById("result").innerText = "Please enter valid numbers! 💕";
        return;
      }
      let result = num2 === 0 ? "Cannot divide by zero! 🚫" : (num1 / num2).toFixed(2) + " ⭐";
      document.getElementById("result").innerText = num2 === 0 ? result : "Result: " + result;
    }
  </script>
</body>
</html>
