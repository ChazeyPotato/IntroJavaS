<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Activity Dashboard Hub</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background-color: #fafafa;
      color: #222222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #111111;
      margin-bottom: 0.25rem;
    }

    header p {
      color: #666666;
      font-size: 0.95rem;
    }

    main {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .btn-link {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #ffffff;
      color: #222222;
      text-decoration: none;
      padding: 1.2rem 1.5rem;
      border-radius: 12px;
      font-weight: 500;
      font-size: 1rem;
      border: 1px solid #e5e5e5;
      transition: all 0.2s ease;
    }

    .btn-link:hover {
      background: #f4f4f5;
      border-color: #d4d4d8;
      transform: translateX(4px);
    }

    .arrow {
      color: #a1a1aa;
      transition: color 0.2s;
    }

    .btn-link:hover .arrow {
      color: #111111;
    }

    footer {
      margin-top: 3rem;
      color: #a1a1aa;
      font-size: 0.8rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Web Projects Hub</h1>
    <p>Select an activity to view</p>
  </header>

  <main>
    <a href="Activity1.html" class="btn-link">
      <span>Activity 1: Simple Calculator ✨</span>
      <span class="arrow">→</span>
    </a>

    <a href="Activity2.html" class="btn-link">
      <span>Activity 2: MCJabi Order App 🍔</span>
      <span class="arrow">→</span>
    </a>

    <a href="Activity3.html" class="btn-link">
      <span>Activity 3: Grab Fare Estimator 🚗</span>
      <span class="arrow">→</span>
    </a>
  </main>

  <footer>
    <p>© 2026 Compilation Dashboard</p>
  </footer>

</body>
</html>
