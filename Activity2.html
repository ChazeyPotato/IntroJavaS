<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MCJabi Order App</title>
  <link rel="stylesheet" href="css/order-app.css">
</head>
<body>

  <div class="container">
    <div class="header-nav">
      <a href="index.html" class="btn-back-jollibee">← Back to Hub</a>
    </div>

    <h1>MCJabi Order App</h1>

    <div class="app-layout">
      <div class="menu">
        <div class="item">
          <img src="pics/burger.png" alt="Hamburger">
          <div>
            <div class="item-name">Hamburger</div>
            <div class="item-price">₱100.00</div>
          </div>
          <div class="qty-wrapper">
            <button type="button" class="qty-btn" onclick="changeQty('qty-hamburger', -1)">-</button>
            <input type="number" id="qty-hamburger" value="0" min="0">
            <button type="button" class="qty-btn" onclick="changeQty('qty-hamburger', 1)">+</button>
          </div>
        </div>

        <div class="item">
          <img src="pics/spaghetti.png" alt="Spaghetti">
          <div>
            <div class="item-name">Spaghetti</div>
            <div class="item-price">₱120.00</div>
          </div>
          <div class="qty-wrapper">
            <button type="button" class="qty-btn" onclick="changeQty('qty-spaghetti', -1)">-</button>
            <input type="number" id="qty-spaghetti" value="0" min="0">
            <button type="button" class="qty-btn" onclick="changeQty('qty-spaghetti', 1)">+</button>
          </div>
        </div>

        <div class="item">
          <img src="pics/chicken.png" alt="Chicken">
          <div>
            <div class="item-name">Chicken</div>
            <div class="item-price">₱150.00</div>
          </div>
          <div class="qty-wrapper">
            <button type="button" class="qty-btn" onclick="changeQty('qty-chicken', -1)">-</button>
            <input type="number" id="qty-chicken" value="0" min="0">
            <button type="button" class="qty-btn" onclick="changeQty('qty-chicken', 1)">+</button>
          </div>
        </div>

        <div class="item">
          <img src="pics/icecream.png" alt="Ice Cream">
          <div>
            <div class="item-name">Ice Cream</div>
            <div class="item-price">₱35.00</div>
          </div>
          <div class="qty-wrapper">
            <button type="button" class="qty-btn" onclick="changeQty('qty-icecream', -1)">-</button>
            <input type="number" id="qty-icecream" value="0" min="0">
            <button type="button" class="qty-btn" onclick="changeQty('qty-icecream', 1)">+</button>
          </div>
        </div>

        <div class="item">
          <img src="pics/coke.png" alt="Coke">
          <div>
            <div class="item-name">Coke</div>
            <div class="item-price">₱45.00</div>
          </div>
          <div class="qty-wrapper">
            <button type="button" class="qty-btn" onclick="changeQty('qty-coke', -1)">-</button>
            <input type="number" id="qty-coke" value="0" min="0">
            <button type="button" class="qty-btn" onclick="changeQty('qty-coke', 1)">+</button>
          </div>
        </div>
      </div>

      <div class="checkout-panel">
        <h2 class="panel-title">Order Summary</h2>
        
        <div class="discount-box">
          <label for="discount">Apply Promotion / Discount</label>
          <select id="discount">
            <option value="0">None</option>
            <option value="0.25">Senior Citizen (25%)</option>
            <option value="0.20">Membership Card (20%)</option>
            <option value="0.15">Manager (15%)</option>
          </select>
        </div>

        <button type="button" class="btn-calculate" onclick="calculateOrder()">Compute Total</button>

        <div class="receipt">
          <div class="receipt-row">
            <span>Subtotal</span>
            <span id="txt-subtotal">₱0.00</span>
          </div>
          <div class="receipt-row discount-row">
            <span>Discount</span>
            <span id="txt-discount">-₱0.00</span>
          </div>
          <div class="receipt-divider"></div>
          <div class="receipt-row total-row">
            <span>Total Price</span>
            <span id="txt-total">₱0.00</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function calculateOrder(){
      const prices = {
        hamburger: 100,
        spaghetti: 120,
        chicken: 150,
        icecream: 35,
        coke: 45
      };

      const qtyHamburger = parseInt(document.getElementById("qty-hamburger").value) || 0;
      const qtySpaghetti = parseInt(document.getElementById("qty-spaghetti").value) || 0;
      const qtyChicken = parseInt(document.getElementById("qty-chicken").value) || 0;
      const qtyIceCream = parseInt(document.getElementById("qty-icecream").value) || 0;
      const qtyCoke = parseInt(document.getElementById("qty-coke").value) || 0;

      const subtotal = (qtyHamburger * prices.hamburger) +
                       (qtySpaghetti * prices.spaghetti) +
                       (qtyChicken * prices.chicken) +
                       (qtyIceCream * prices.icecream) +
                       (qtyCoke * prices.coke);

      const discountRate = parseFloat(document.getElementById("discount").value);
      const discount = subtotal * discountRate;
      const total = subtotal - discount;

      document.getElementById("txt-subtotal").innerText = `₱${subtotal.toFixed(2)}`;
      document.getElementById("txt-discount").innerText = `-₱${discount.toFixed(2)}`;
      document.getElementById("txt-total").innerText = `₱${total.toFixed(2)}`;
    }

    function changeQty(id, amount) {
      const input = document.getElementById(id);
      let currentVal = parseInt(input.value) || 0;
      let newVal = currentVal + amount;
      if (newVal < 0) newVal = 0;
      input.value = newVal;
    }

    calculateOrder();
  </script>
</body>
</html>
